<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location OG Image Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        .og-container {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0066CC 0%, #004A99 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .og-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .og-container::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .location-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .location-name {
            font-size: 72px;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .postcode {
            font-size: 36px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .tagline {
            font-size: 28px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
            max-width: 900px;
            line-height: 1.4;
        }

        .shield-icon {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <!-- Shield icon (decorative) -->
        <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>

        <div class="content">

            <h1 class="location-name" id="locationName">Melbourne CBD</h1>
            <div class="postcode" id="postcode">3000</div>
            <p class="tagline">Expert Cyber Security for Local Businesses</p>
        </div>
    </div>
